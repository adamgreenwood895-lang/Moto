<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Dashboard</title>
  <link rel="stylesheet" href="style.css">

  <style>
    body {
      background: black;
      color: #f5a623;
      font-family: Arial;
      padding: 20px;
    }

    h1 {
      text-align: center;
      margin-bottom: 20px;
    }

    .job {
      border: 1px solid rgba(255,170,60,0.3);
      padding: 15px;
      margin-bottom: 12px;
      border-radius: 10px;
      background: rgba(255,170,60,0.05);
    }

    .ref {
      font-weight: bold;
      font-size: 18px;
      margin-bottom: 5px;
    }

    .desc {
      opacity: 0.8;
      margin-bottom: 8px;
    }

    .status {
      font-size: 14px;
      opacity: 0.6;
    }

    button {
      margin-top: 10px;
      padding: 6px 10px;
      background: #f5a623;
      border: none;
      border-radius: 6px;
      cursor: pointer;
    }
  </style>
</head>

<body>

  <h1>Workshop Dashboard</h1>

  <div id="jobList"></div>

  <button onclick="goBack()">← Back</button>

  <script>

    function getJobs() {
      return JSON.parse(localStorage.getItem("jobs")) || [];
    }

    function renderJobs() {
      const jobs = getJobs();
      const container = document.getElementById("jobList");

      container.innerHTML = "";

      // Newest first
      jobs.reverse().forEach(job => {
        const div = document.createElement("div");
        div.className = "job";

        div.innerHTML = `
          <div class="ref">${job.reference}</div>
          <div class="desc">${job.description}</div>
          <div class="status">Status: ${job.status}</div>
          <button onclick="completeJob(${job.id})">Mark Complete</button>
        `;

        container.appendChild(div);
      });
    }

    function completeJob(id) {
      let jobs = getJobs();

      jobs = jobs.map(j => {
        if (j.id === id) {
          j.status = "Ready";
        }
        return j;
      });

      localStorage.setItem("jobs", JSON.stringify(jobs));
      renderJobs();
    }

    function goBack() {
      window.location.href = "index.html";
    }

    renderJobs();

  </script>

</body>
</html>
