<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>MotoFlow Dashboard</title>
  <link rel="stylesheet" href="dashboard.css">
</head>
<body class="motoflow">

  <!-- SIDEBAR -->
  <div class="sidebar">
    <h2>MOTOFLOW</h2>
    <ul>
      <li>Dashboard</li>
      <li>Jobs</li>
      <li>Customers</li>
      <li>Settings</li>
    </ul>
  </div>

  <!-- MAIN -->
  <div class="main">

    <div class="topbar">
      <h1>Workshop Dashboard</h1>
    </div>

    <div class="grid">

      <!-- JOB LIST -->
      <div class="card">
        <h2>Active Jobs</h2>
        <div id="jobList"></div>
      </div>

      <!-- COMPLETED -->
      <div class="card">
        <h2>Completed</h2>
        <div id="completedJobList"></div>
      </div>

    </div>

  </div>

  <!-- JOB PANEL -->
  <div id="jobPanel" class="hidden">
    <textarea id="jobDesc"></textarea>
    <button id="saveJob">Save</button>
    <button id="closePanel">Close</button>
  </div>

  <button id="dashboardMic">🎤</button>

  <script src="dashboard.js"></script>
</body>
</html>
