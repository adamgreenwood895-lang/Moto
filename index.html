<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Moto</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: radial-gradient(circle at center, #1a1a1a, #000000);
      color: #ffb347;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .container {
      text-align: center;
      width: 100%;
      max-width: 400px;
    }

    .logo {
      font-size: 42px;
      letter-spacing: 6px;
      margin-bottom: 20px;
      background: linear-gradient(90deg, #ff8c00, #ffd700);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .tagline h2 {
      font-size: 26px;
      margin: 0;
    }

    .tagline p {
      margin-top: 5px;
      opacity: 0.7;
    }

    .mic-wrapper {
      margin: 60px 0;
    }

    .mic-button {
      width: 160px;
      height: 160px;
      border-radius: 50%;
      background: radial-gradient(circle, #222, #000);
      border: 2px solid #ff8c00;
      box-shadow:
        0 0 30px rgba(255,140,0,0.6),
        inset 0 0 20px rgba(255,140,0,0.3);
      cursor: pointer;
    }

    .footer {
      position: absolute;
      bottom: 20px;
      font-size: 12px;
      opacity: 0.6;
    }
  </style>
</head>

<body>

  <div class="container">

    <h1 class="logo">MOTO</h1>

    <div class="tagline">
      <h2>Say it, done.</h2>
      <p>We’ll handle the rest.</p>
    </div>

    <div class="mic-wrapper">
      <div class="mic-button" onclick="test()"></div>
    </div>

    <p class="footer">Powered by Operon</p>

  </div>

  <script>
    function test() {
      alert("Mic working");
    }
  </script>

</body>
</html>
