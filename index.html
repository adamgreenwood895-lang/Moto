<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Moto</title>

  <style>
    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
    }

    body {
      background-image: url('bg.png');
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
    }

    .mic-hitbox {
      position: absolute;
      width: 230px;
      height: 230px;
      left: 50%;
      top: 62%;
      transform: translate(-50%, -50%);
      border-radius: 50%;
      cursor: pointer;
    }

    .status {
      position: absolute;
      bottom: 80px;
      width: 100%;
      text-align: center;
      color: #ffb347;
      font-size: 14px;
      font-family: Arial, sans-serif;
    }
  </style>
</head>

<body>

  <div class="mic-hitbox" onclick="test()"></div>
  <div class="status">Tap to speak</div>

  <script>
    function test() {
      alert("Working");
    }
  </script>

</body>
</html>
